<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./tutorials/quickstart.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting… Quick Start — m1nd Wiki</title>
    <link rel="canonical" href="https://m1nd.world/wiki/tutorials/quickstart.html" />
    <style>
      :root {
        --bg: #0a0a0f;
        --card: #13151e;
        --border: #1e2433;
        --text: #f0f2f5;
        --muted: #8b9daf;
        --cyan: #00d4ff;
        --mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
        --sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
      }
      .card {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
      }
      .eyebrow {
        font: 12px var(--mono);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--cyan);
        margin-bottom: 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      a {
        color: var(--cyan);
        text-decoration: none;
      }
    </style>
    <script>
      window.location.replace("./tutorials/quickstart.html");
    </script>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">m1nd wiki</div>
      <h1>Redirecting to the current Quick Start…</h1>
      <p>
        If you are not redirected automatically,
        <a href="./tutorials/quickstart.html">open the canonical tutorial here</a>.
      </p>
    </main>
  </body>
  </html>
