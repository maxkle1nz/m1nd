<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0A0E17"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1D24" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Large activation graph (left side) -->
  <!-- Central node -->
  <circle cx="350" cy="320" r="40" fill="#00E5A0" opacity="0.9"/>
  <circle cx="350" cy="320" r="55" fill="#00E5A0" opacity="0.1"/>
  <circle cx="350" cy="320" r="75" fill="#00E5A0" opacity="0.05"/>

  <!-- First hop -->
  <circle cx="220" cy="220" r="25" fill="#00E5A0" opacity="0.65"/>
  <circle cx="480" cy="240" r="28" fill="#00E5A0" opacity="0.65"/>
  <circle cx="260" cy="440" r="22" fill="#00E5A0" opacity="0.65"/>
  <circle cx="470" cy="420" r="24" fill="#00E5A0" opacity="0.65"/>

  <!-- Second hop -->
  <circle cx="120" cy="160" r="16" fill="#00E5A0" opacity="0.35"/>
  <circle cx="160" cy="320" r="14" fill="#00E5A0" opacity="0.35"/>
  <circle cx="560" cy="180" r="15" fill="#00E5A0" opacity="0.35"/>
  <circle cx="580" cy="360" r="17" fill="#00E5A0" opacity="0.35"/>
  <circle cx="180" cy="520" r="13" fill="#00E5A0" opacity="0.35"/>
  <circle cx="400" cy="520" r="15" fill="#00E5A0" opacity="0.35"/>

  <!-- Third hop (faint) -->
  <circle cx="60" cy="100" r="8" fill="#00E5A0" opacity="0.12"/>
  <circle cx="80" cy="260" r="7" fill="#00E5A0" opacity="0.12"/>
  <circle cx="620" cy="120" r="9" fill="#00E5A0" opacity="0.12"/>
  <circle cx="650" cy="440" r="8" fill="#00E5A0" opacity="0.12"/>
  <circle cx="120" cy="580" r="7" fill="#00E5A0" opacity="0.12"/>
  <circle cx="500" cy="560" r="8" fill="#00E5A0" opacity="0.12"/>

  <!-- Noise nodes (red, XLR cancelled) -->
  <circle cx="530" cy="300" r="12" fill="#FF3366" opacity="0.2"/>
  <circle cx="300" cy="180" r="10" fill="#FF3366" opacity="0.15"/>
  <circle cx="420" cy="500" r="11" fill="#FF3366" opacity="0.15"/>

  <!-- Edges from center -->
  <line x1="350" y1="320" x2="220" y2="220" stroke="#00E5A0" stroke-width="2.5" opacity="0.45"/>
  <line x1="350" y1="320" x2="480" y2="240" stroke="#00E5A0" stroke-width="2.5" opacity="0.45"/>
  <line x1="350" y1="320" x2="260" y2="440" stroke="#00E5A0" stroke-width="2.5" opacity="0.45"/>
  <line x1="350" y1="320" x2="470" y2="420" stroke="#00E5A0" stroke-width="2.5" opacity="0.45"/>

  <!-- Edges from first hop -->
  <line x1="220" y1="220" x2="120" y2="160" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>
  <line x1="220" y1="220" x2="160" y2="320" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>
  <line x1="480" y1="240" x2="560" y2="180" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>
  <line x1="480" y1="240" x2="580" y2="360" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>
  <line x1="260" y1="440" x2="180" y2="520" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>
  <line x1="260" y1="440" x2="400" y2="520" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>
  <line x1="470" y1="420" x2="580" y2="360" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>

  <!-- Second hop edges (faint) -->
  <line x1="120" y1="160" x2="60" y2="100" stroke="#00E5A0" stroke-width="1" opacity="0.1"/>
  <line x1="160" y1="320" x2="80" y2="260" stroke="#00E5A0" stroke-width="1" opacity="0.1"/>
  <line x1="560" y1="180" x2="620" y2="120" stroke="#00E5A0" stroke-width="1" opacity="0.1"/>
  <line x1="580" y1="360" x2="650" y2="440" stroke="#00E5A0" stroke-width="1" opacity="0.1"/>
  <line x1="180" y1="520" x2="120" y2="580" stroke="#00E5A0" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="520" x2="500" y2="560" stroke="#00E5A0" stroke-width="1" opacity="0.1"/>

  <!-- Ghost edges (gold, dashed) -->
  <line x1="580" y1="360" x2="400" y2="520" stroke="#F5A623" stroke-width="1.2" opacity="0.2" stroke-dasharray="6,4"/>
  <line x1="160" y1="320" x2="260" y2="440" stroke="#F5A623" stroke-width="1.2" opacity="0.2" stroke-dasharray="6,4"/>

  <!-- Noise cancellation lines (red, crossed out) -->
  <line x1="350" y1="320" x2="530" y2="300" stroke="#FF3366" stroke-width="1" opacity="0.15"/>
  <line x1="520" y1="290" x2="540" y2="310" stroke="#FF3366" stroke-width="2" opacity="0.3"/>
  <line x1="540" y1="290" x2="520" y2="310" stroke="#FF3366" stroke-width="2" opacity="0.3"/>

  <!-- Text (right side) -->
  <!-- m1nd -->
  <text x="760" y="280" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="96" font-weight="700" fill="#F0F2F5" letter-spacing="-2">m</text>
  <text x="844" y="280" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="96" font-weight="700" fill="#00E5A0" letter-spacing="-2">1</text>
  <text x="892" y="280" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="96" font-weight="700" fill="#F0F2F5" letter-spacing="-2">nd</text>

  <!-- Descriptor -->
  <text x="762" y="330" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="24" fill="#8B9DAF" letter-spacing="0.8">Cognitive Graph Engine</text>

  <!-- Tagline -->
  <text x="762" y="375" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" fill="#8B9DAF" opacity="0.5" letter-spacing="0.4">Give your agents a nervous system.</text>

  <!-- Stats -->
  <text x="762" y="440" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="14" fill="#00E5A0" opacity="0.7">13 MCP tools</text>
  <text x="762" y="465" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="14" fill="#00E5A0" opacity="0.5">4D spreading activation</text>
  <text x="762" y="490" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="14" fill="#00E5A0" opacity="0.35">Hebbian plasticity</text>
  <text x="762" y="515" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="14" fill="#00E5A0" opacity="0.2">XLR noise cancellation</text>

  <!-- Author -->
  <text x="762" y="580" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12" fill="#5A6577" letter-spacing="2">COSMOPHONIX INTELLIGENCE</text>
</svg>
