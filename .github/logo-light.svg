<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <!-- Background (light) -->
  <rect width="480" height="160" rx="12" fill="#FFFFFF"/>

  <!-- Graph nodes - spreading activation pattern -->
  <circle cx="80" cy="80" r="14" fill="#00B880" opacity="1.0"/>
  <circle cx="80" cy="80" r="20" fill="#00B880" opacity="0.12"/>

  <circle cx="40" cy="50" r="9" fill="#00B880" opacity="0.7"/>
  <circle cx="120" cy="55" r="10" fill="#00B880" opacity="0.7"/>
  <circle cx="55" cy="120" r="8" fill="#00B880" opacity="0.7"/>

  <circle cx="15" cy="30" r="6" fill="#00B880" opacity="0.4"/>
  <circle cx="140" cy="30" r="5" fill="#00B880" opacity="0.4"/>
  <circle cx="130" cy="100" r="6" fill="#00B880" opacity="0.4"/>
  <circle cx="25" cy="130" r="5" fill="#00B880" opacity="0.4"/>

  <circle cx="5" cy="60" r="3" fill="#00B880" opacity="0.15"/>
  <circle cx="155" cy="60" r="4" fill="#00B880" opacity="0.15"/>
  <circle cx="100" cy="135" r="3" fill="#00B880" opacity="0.15"/>

  <!-- Edges -->
  <line x1="80" y1="80" x2="40" y2="50" stroke="#00B880" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="80" x2="120" y2="55" stroke="#00B880" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="80" x2="55" y2="120" stroke="#00B880" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="50" x2="15" y2="30" stroke="#00B880" stroke-width="1" opacity="0.25"/>
  <line x1="40" y1="50" x2="5" y2="60" stroke="#00B880" stroke-width="1" opacity="0.12"/>
  <line x1="120" y1="55" x2="140" y2="30" stroke="#00B880" stroke-width="1" opacity="0.25"/>
  <line x1="120" y1="55" x2="130" y2="100" stroke="#00B880" stroke-width="1" opacity="0.25"/>
  <line x1="120" y1="55" x2="155" y2="60" stroke="#00B880" stroke-width="1" opacity="0.12"/>
  <line x1="55" y1="120" x2="25" y2="130" stroke="#00B880" stroke-width="1" opacity="0.25"/>
  <line x1="55" y1="120" x2="100" y2="135" stroke="#00B880" stroke-width="1" opacity="0.12"/>

  <line x1="130" y1="100" x2="100" y2="135" stroke="#D4880A" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Wordmark -->
  <text x="190" y="72" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="48" font-weight="700" fill="#1A1D24" letter-spacing="-1">m</text>
  <text x="232" y="72" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="48" font-weight="700" fill="#00B880" letter-spacing="-1">1</text>
  <text x="256" y="72" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="48" font-weight="700" fill="#1A1D24" letter-spacing="-1">nd</text>

  <text x="190" y="100" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" fill="#5A6577" letter-spacing="0.5">Cognitive Graph Engine</text>
  <text x="190" y="125" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#5A6577" opacity="0.6" letter-spacing="0.3">Give your agents a nervous system.</text>
</svg>
