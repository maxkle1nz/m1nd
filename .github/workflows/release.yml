name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: m1nd-mcp

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: m1nd-mcp-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: m1nd-mcp-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: m1nd-mcp-macos-aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin m1nd-mcp --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: |
          mkdir -p release-bins
          find artifacts/ -type f -exec mv {} release-bins/ \;
          ls -la release-bins/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-bins/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check crates.io token
        id: publish_guard
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish m1nd-core
        if: ${{ steps.publish_guard.outputs.enabled == 'true' }}
        run: cargo publish -p m1nd-core --token "$CARGO_REGISTRY_TOKEN"

      - name: Wait for crates.io index propagation
        if: ${{ steps.publish_guard.outputs.enabled == 'true' }}
        run: sleep 30

      - name: Publish m1nd-ingest
        if: ${{ steps.publish_guard.outputs.enabled == 'true' }}
        run: cargo publish -p m1nd-ingest --token "$CARGO_REGISTRY_TOKEN"

      - name: Wait for crates.io index propagation
        if: ${{ steps.publish_guard.outputs.enabled == 'true' }}
        run: sleep 30

      - name: Publish m1nd-mcp
        if: ${{ steps.publish_guard.outputs.enabled == 'true' }}
        run: cargo publish -p m1nd-mcp --token "$CARGO_REGISTRY_TOKEN"
