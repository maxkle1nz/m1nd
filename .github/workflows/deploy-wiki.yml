name: Deploy m1nd Site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'm1nd-demo/**'
      - '.github/workflows/deploy-wiki.yml'

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install landing dependencies
        working-directory: ./m1nd-demo
        run: npm ci

      - name: Build landing
        working-directory: ./m1nd-demo
        run: npm run build

      - name: Build mdBook
        run: mdbook build docs/wiki

      - name: Compose Pages artifact
        run: |
          rm -rf site-dist
          mkdir -p site-dist/wiki
          cp -R m1nd-demo/dist/. site-dist/
          cp -R wiki-build/. site-dist/wiki/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site-dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
