<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#0A0E17"/>

  <!-- Graph mark - compact activation pattern -->
  <!-- Central node -->
  <circle cx="64" cy="58" r="12" fill="#00E5A0" opacity="1.0"/>
  <circle cx="64" cy="58" r="18" fill="#00E5A0" opacity="0.12"/>

  <!-- First hop -->
  <circle cx="36" cy="36" r="7" fill="#00E5A0" opacity="0.65"/>
  <circle cx="96" cy="40" r="8" fill="#00E5A0" opacity="0.65"/>
  <circle cx="44" cy="88" r="6" fill="#00E5A0" opacity="0.65"/>
  <circle cx="88" cy="84" r="7" fill="#00E5A0" opacity="0.65"/>

  <!-- Second hop (faint) -->
  <circle cx="18" cy="18" r="4" fill="#00E5A0" opacity="0.3"/>
  <circle cx="112" cy="22" r="4" fill="#00E5A0" opacity="0.3"/>
  <circle cx="22" cy="106" r="3" fill="#00E5A0" opacity="0.3"/>
  <circle cx="108" cy="100" r="4" fill="#00E5A0" opacity="0.3"/>

  <!-- Edges -->
  <line x1="64" y1="58" x2="36" y2="36" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
  <line x1="64" y1="58" x2="96" y2="40" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
  <line x1="64" y1="58" x2="44" y2="88" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
  <line x1="64" y1="58" x2="88" y2="84" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>

  <line x1="36" y1="36" x2="18" y2="18" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
  <line x1="96" y1="40" x2="112" y2="22" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
  <line x1="44" y1="88" x2="22" y2="106" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
  <line x1="88" y1="84" x2="108" y2="100" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>

  <!-- Cross edges -->
  <line x1="36" y1="36" x2="44" y2="88" stroke="#00E5A0" stroke-width="0.8" opacity="0.12"/>
  <line x1="96" y1="40" x2="88" y2="84" stroke="#00E5A0" stroke-width="0.8" opacity="0.12"/>
</svg>
